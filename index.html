<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>This Place Is a Scam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --red: #a30000;
      --red-dark: #5a0000;
      --gold: #f5c542;
      --black: #111111;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #cc0000 0%, #630000 45%, #200000 100%);
      color: var(--gold);
      overflow: hidden;
    }

    .wallpaper {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.1) 0, rgba(0,0,0,0.7) 70%),
        radial-gradient(circle at top, #d00000 0, #4a0000 55%, #180000 100%);
      overflow: hidden;
    }

    /* Rays */
    .rays {
      position: absolute;
      inset: -10vh;
      background-image:
        repeating-linear-gradient(
          60deg,
          rgba(245, 197, 66, 0.06) 0,
          rgba(245, 197, 66, 0.06) 2px,
          transparent 2px,
          transparent 16px
        ),
        repeating-linear-gradient(
          -60deg,
          rgba(245, 197, 66, 0.04) 0,
          rgba(245, 197, 66, 0.04) 2px,
          transparent 2px,
          transparent 18px
        );
      opacity: 0.9;
      pointer-events: none;
    }

    .frame {
      position: absolute;
      inset: 3vh 4vw;
      border: 4px solid var(--gold);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.7),
        0 0 40px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    .content {
      position: relative;
      text-align: center;
      padding: 4vh 4vw;
      max-width: 1400px;
      z-index: 2;
    }

    /* Hammer & sickle emblem */
    .emblem-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 2vh;
    }

    .emblem {
      position: relative;
      width: clamp(90px, 13vh, 140px);
      height: clamp(90px, 13vh, 140px);
      border-radius: 999px;
      border: 4px solid var(--gold);
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.24) 0, transparent 55%),
        radial-gradient(circle at 70% 80%, #b00000 0, #3a0000 70%);
      box-shadow:
        0 0 0 3px rgba(0,0,0,0.7),
        0 0 22px rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .emblem-inner {
      position: relative;
      width: 70%;
      height: 70%;
    }

    .emblem-hammer,
    .emblem-sickle,
    .emblem-star {
      position: absolute;
      background: var(--gold);
    }

    /* Sickle (arc) */
    .emblem-sickle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(
        from 210deg,
        transparent 0 30deg,
        var(--gold) 30deg 130deg,
        transparent 130deg 360deg
      );
      transform: scale(0.77) translate(10%, -5%);
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.4));
    }

    /* Hammer handle */
    .emblem-hammer {
      width: 18%;
      height: 95%;
      left: 50%;
      top: 10%;
      transform: translateX(-50%) rotate(45deg);
      border-radius: 999px;
      box-shadow: 0 0 3px rgba(0,0,0,0.4);
    }

    /* Hammer head */
    .emblem-hammer::before {
      content: "";
      position: absolute;
      width: 165%;
      height: 32%;
      top: 0;
      left: 50%;
      transform: translate(-50%, -35%);
      border-radius: 6px;
      background: var(--gold);
      box-shadow: 0 0 3px rgba(0,0,0,0.4);
    }

    /* Small star above emblem */
    .emblem-star {
      width: 32%;
      height: 32%;
      left: 50%;
      top: -20%;
      transform: translateX(-50%) rotate(35deg);
      clip-path: polygon(
        50% 0%,
        64% 40%,
        100% 40%,
        70% 63%,
        82% 100%,
        50% 78%,
        18% 100%,
        30% 63%,
        0% 40%,
        36% 40%
      );
      box-shadow: 0 0 4px rgba(0,0,0,0.6);
    }

    /* Banner ribbon behind slogan */
    .banner {
      position: relative;
      margin: 3vh auto 0 auto;
      display: inline-block;
      padding: 1.3vh 3vw 1.6vh;
      background: linear-gradient(180deg, #b80000 0%, #600000 100%);
      border-top: 3px solid var(--gold);
      border-bottom: 3px solid var(--gold);
      box-shadow:
        0 0 0 2px rgba(0,0,0,0.6),
        0 0 22px rgba(0,0,0,0.85);
    }

    .banner::before,
    .banner::after {
      content: "";
      position: absolute;
      top: 0;
      width: 3vw;
      min-width: 26px;
      height: 100%;
      background: linear-gradient(180deg, #b80000 0%, #600000 100%);
      border-top: 3px solid var(--gold);
      border-bottom: 3px solid var(--gold);
      z-index: -1;
    }

    .banner::before {
      left: -2.2vw;
      transform: skewX(-16deg);
    }

    .banner::after {
      right: -2.2vw;
      transform: skewX(16deg);
    }

    .banner-text {
      font-family: "Impact", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(2.6rem, 5vw, 4.4rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      white-space: nowrap;
      color: var(--gold);
      text-shadow:
        0 0 4px rgba(0,0,0,0.9),
        0.08em 0.08em 0 var(--black);
    }

    .banner-text span {
      display: inline-block;
      transform: scaleY(1.06);
    }

    .subtitle {
      margin-top: 2vh;
      font-size: clamp(0.9rem, 1.3vw, 1.1rem);
      text-transform: uppercase;
      letter-spacing: 0.35em;
      opacity: 0.8;
      color: rgba(245, 197, 66, 0.9);
    }

    .scanline {
      pointer-events: none;
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(
          rgba(0,0,0,0.28) 1px,
          transparent 1px
        );
      background-size: 100% 3px;
      mix-blend-mode: soft-light;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .frame {
        inset: 2vh 3vw;
        border-width: 3px;
      }
      .banner::before,
      .banner::after {
        display: none;
      }
      .banner-text {
        letter-spacing: 0.16em;
        white-space: normal;
        line-height: 1.25;
      }
    }
  </style>
</head>
<body>
  <div class="wallpaper">
    <div class="rays"></div>
    <div class="frame"></div>
    <div class="scanline"></div>

    <div class="content">
      <div class="emblem-wrapper">
        <div class="emblem">
          <div class="emblem-inner">
            <div class="emblem-sickle"></div>
            <div class="emblem-hammer"></div>
            <div class="emblem-star"></div>
          </div>
        </div>
      </div>

      <div class="banner">
        <div class="banner-text">
          <span>THIS&nbsp;PLACE&nbsp;IS&nbsp;A&nbsp;SCAM</span>
        </div>
      </div>

      <div class="subtitle">
        PROPAGANDA&nbsp;UNIT&nbsp;NO.&nbsp;1917
      </div>
    </div>
  </div>
</body>
</html>
